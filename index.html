<!DOCTYPE html>
<html lang="es">

<head>

    <title>Proyecto Three.js FPS</title>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="main.css">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
    }
    </script>

</head>

<body>

    <!-- NAVBAR -->

    <nav id="navbar">

        <h1>🍩 Proyecto Three.js FPS</h1>

        <p>
            CLICK IZQUIERDO para mover cámara<br>
            WASD para caminar | SPACE para saltar
        </p>

    </nav>

    <!-- CONTENEDOR -->

    <div id="container"></div>

    <!-- FOOTER -->

    <footer id="footer">

        <p>Desarrollado por: Roman Resendiz 💻</p>

        <p>Carrera: Ingeniería en Sistemas Computacionales</p>

        <p>Maestro: Pinedo Fernandez Victor Manuel</p>

        <p>Materia: Graficación</p>

    </footer>

<script type="module">

import * as THREE from 'three';

import Stats from 'three/addons/libs/stats.module.js';

import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

import { Octree } from 'three/addons/math/Octree.js';

import { Capsule } from 'three/addons/math/Capsule.js';

// ESCENA

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87CEEB);

const clock = new THREE.Clock();

// CAMARA

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.rotation.order = 'YXZ';

// RENDER

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.shadowMap.enabled = true;

document.getElementById('container')
    .appendChild(renderer.domElement);

// LUCES

const hemiLight = new THREE.HemisphereLight(
    0xffffff,
    0x444444,
    2
);

scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(
    0xffffff,
    2
);

dirLight.position.set(5, 10, 7);

dirLight.castShadow = true;

scene.add(dirLight);

// AXES

const axes = new THREE.AxesHelper(5);

scene.add(axes);

// STATS

const stats = new Stats();

document.body.appendChild(stats.dom);

// OCTREE

const worldOctree = new Octree();

// PLAYER

const playerCollider = new Capsule(
    new THREE.Vector3(0, 2, 0),
    new THREE.Vector3(0, 3, 0),
    0.35
);

const playerVelocity = new THREE.Vector3();

const playerDirection = new THREE.Vector3();

let playerOnFloor = false;
const donuts = [];

const donutGeometry = new THREE.TorusGeometry(
    0.5,
    0.18,
    32,
    100
);

const donutMaterial = new THREE.MeshToonMaterial({
    color: 0xff69b4
});

// TECLAS

const keyStates = {};

document.addEventListener('keydown', (e) => {

    keyStates[e.code] = true;

});

window.addEventListener('keydown', (e) => {

    if (e.code === 'Space') {

        e.preventDefault();

    }

});

document.addEventListener('keyup', (e) => {

    keyStates[e.code] = false;

});

// MOUSE

let mouseDown = false;

document.addEventListener('mousedown', () => {

    mouseDown = true;

});

document.addEventListener('mouseup', () => {

    mouseDown = false;

});

document.addEventListener('click', () => {

    throwDonut();

});

document.addEventListener('mousemove', (event) => {

    if (mouseDown) {

        camera.rotation.y -= event.movementX * 0.002;

        camera.rotation.x -= event.movementY * 0.002;

    }

});

// GRAVEDAD

const GRAVITY = 30;

// CONTROLES

function controls(deltaTime) {

    const speed = playerOnFloor ? 25 : 8;

    if (keyStates['KeyW']) {

        playerVelocity.add(
            getForwardVector().multiplyScalar(speed * deltaTime)
        );

    }

    if (keyStates['KeyS']) {

        playerVelocity.add(
            getForwardVector().multiplyScalar(-speed * deltaTime)
        );

    }

    if (keyStates['KeyA']) {

        playerVelocity.add(
            getSideVector().multiplyScalar(-speed * deltaTime)
        );

    }

    if (keyStates['KeyD']) {

        playerVelocity.add(
            getSideVector().multiplyScalar(speed * deltaTime)
        );

    }

    if (playerOnFloor && keyStates['Space']) {

        playerVelocity.y = 12;

    }

}

function getForwardVector() {

    camera.getWorldDirection(playerDirection);

    playerDirection.y = 0;

    playerDirection.normalize();

    return playerDirection;

}

function getSideVector() {

    camera.getWorldDirection(playerDirection);

    playerDirection.y = 0;

    playerDirection.normalize();

    playerDirection.cross(camera.up);

    return playerDirection;

}

function throwDonut() {

    const donut = new THREE.Mesh(
        donutGeometry,
        donutMaterial
    );

    donut.rotation.x = Math.PI / 2;

    donut.castShadow = true;

    // posición inicial

    donut.position.copy(camera.position);

    // dirección

    const direction = new THREE.Vector3();

    camera.getWorldDirection(direction);

    // velocidad

    donut.userData.velocity =
    direction.multiplyScalar(0.8);

    scene.add(donut);

    donuts.push(donut);

}

// COLISIONES

function playerCollisions() {

    const result = worldOctree.capsuleIntersect(
        playerCollider
    );

    playerOnFloor = false;

    if (result) {

        playerOnFloor = result.normal.y > 0;

        if (!playerOnFloor) {

            playerVelocity.addScaledVector(
                result.normal,
                -result.normal.dot(playerVelocity)
            );

        }

        playerCollider.translate(
            result.normal.multiplyScalar(result.depth)
        );

    }

}

// UPDATE PLAYER

function updatePlayer(deltaTime) {

    let damping = Math.exp(-4 * deltaTime) - 1;

    if (!playerOnFloor) {

        playerVelocity.y -= GRAVITY * deltaTime;

        damping *= 0.1;

    }

    playerVelocity.addScaledVector(
        playerVelocity,
        damping
    );

    const deltaPosition = playerVelocity
        .clone()
        .multiplyScalar(deltaTime);

    playerCollider.translate(deltaPosition);

    playerCollisions();

    camera.position.copy(playerCollider.end);

}

function updateDonuts() {

    donuts.forEach((donut) => {

        // mover dona

        donut.position.add(
            donut.userData.velocity
        );

        // collider esfera

        const donutCollider = new THREE.Sphere(
            donut.position,
            0.2
        );

        // colisión con escenario

        const result =
            worldOctree.sphereIntersect(
                donutCollider
            );

        // rebote

        if (result) {

            donut.userData.velocity.reflect(
                result.normal
            );

            donut.position.add(
                result.normal.multiplyScalar(
                    result.depth
                )
            );

            // perder velocidad

            donut.userData.velocity.multiplyScalar(0.7);

        }

        // gravedad

        donut.userData.velocity.y -= 0.01;

        if (donut.position.y < -10) {

    scene.remove(donut);

}

    });

}

// PISO DE SEGURIDAD

const floorGeometry = new THREE.BoxGeometry(
    500,
    1,
    500
);

const floorMaterial = new THREE.MeshStandardMaterial({
    color: 0x808080
});

const floor = new THREE.Mesh(
    floorGeometry,
    floorMaterial
);

floor.position.y = -1;

floor.receiveShadow = true;

scene.add(floor);

worldOctree.fromGraphNode(floor);

// CARGAR MODELO

const loader = new GLTFLoader();

loader.load(
    './models/Duplex.glb',
    
    (gltf) => {

        const model = gltf.scene;

        // ESCALA

        model.scale.setScalar(5);

        // CENTRAR

        const box = new THREE.Box3().setFromObject(model);

        const center = box.getCenter(
            new THREE.Vector3()
        );

        model.position.sub(center);

        // SUBIR MODELO

        model.position.y = 0;

        scene.add(model);

        // SOMBRAS

        model.traverse((child) => {

            if (child.isMesh) {

                child.castShadow = true;

                child.receiveShadow = true;

            }

        });

        // COLISIONES

        worldOctree.fromGraphNode(model);

        // SPAWN DENTRO DEL MODELO

        playerCollider.start.set(0, 2, 5);

        playerCollider.end.set(0, 3, 5);

        camera.position.copy(playerCollider.end);

        console.log("MODELO CARGADO");

    },

    undefined,

    (error) => {

        console.error(error);

    }

);

loader.load('./models/Kingpin.glb', (gltf) => {

    const model = gltf.scene;

    model.scale.setScalar(3);

    model.position.set(5, 0, 0);
    model.rotation.y = Math.PI;

    model.traverse((child) => {

        if (child.isMesh) {

            child.castShadow = true;
            child.receiveShadow = true;

        }

    });

    scene.add(model);

    console.log("PERSONAJE GLB CARGADO");

});

// RESIZE

window.addEventListener('resize', () => {

    camera.aspect =
        window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

// TELEPORT SI CAE

function teleportPlayerIfOob() {

    if (camera.position.y <= -20) {

        playerCollider.start.set(0, 2, 5);

        playerCollider.end.set(0, 3, 5);

        playerVelocity.set(0, 0, 0);

    }

}

// ANIMATE

function animate() {

    const deltaTime =
        Math.min(0.05, clock.getDelta());

    controls(deltaTime);

    updatePlayer(deltaTime);
    updateDonuts();

    teleportPlayerIfOob();

    renderer.render(scene, camera);

    stats.update();

}

renderer.setAnimationLoop(animate);

</script>

</body>

</html>
